<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - Billing</title>
  <link rel="stylesheet" href="./styles.css" />

  <!-- ✅ ضع Snippet تبع SDK تبعك هنا -->
   <script async src="https://sdk-29qr.onrender.com/tag/019ca87d-e8cf-770a-8701-c5d479b1af7f.js?v=0.2.2"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0">Checkout</h1>
        <div class="hint">Billing details + create checkout session (checkout_start)</div>
      </div>
      <div class="nav">
        <a class="btn" href="./pricing.html">Back to Pricing</a>
        <a class="btn" href="./payment.html">Go to Payment</a>
      </div>
    </div>

    <div class="card">
      <h2>Billing Address</h2>
      <form id="billingForm">
        <div class="grid">
          <div>
            <label>Email</label>
            <input id="email" type="email" value="test@example.com" />
          </div>
          <div>
            <label>Plan</label>
            <select id="plan">
              <option value="basic_monthly">Basic Monthly</option>
              <option value="pro_monthly">Pro Monthly</option>
            </select>
          </div>
          <div>
            <label>Full name</label>
            <input id="name" value="Test User" />
          </div>
          <div>
            <label>Country</label>
            <select id="country">
              <option>Germany</option>
              <option>France</option>
              <option>US</option>
            </select>
          </div>
          <div>
            <label>Address</label>
            <input id="address" value="Alexanderplatz 1" />
          </div>
          <div>
            <label>City</label>
            <input id="city" value="Berlin" />
          </div>
        </div>

        <div class="row">
          <button class="primary inline-flex items-center" type="submit" data-elt="continue_to_payment">
            Continue to Payment
          </button>
          <button type="button" id="btnCalc" data-testid="calc_total_btn">Calculate Order</button>
        </div>
      </form>

      <div class="sep"></div>
      <pre id="out"></pre>
    </div>

    <script type="module">
      import { qs, save, load, print, postFetch } from "./_shared.js";

      const out = document.getElementById("out");
      const planEl = document.getElementById("plan");
      const emailEl = document.getElementById("email");

      // set plan from query
      const qp = qs("plan");
      if (qp) planEl.value = qp;

      // Calculate totals (fetch) -> URL includes "order"
      document.getElementById("btnCalc").addEventListener("click", async () => {
        try {
          const plan = planEl.value;
          const amount = plan.includes("pro") ? 4999 : 1999;
          const data = await postFetch("./api/order/calc", { amount }); // contains "order"
          print(out, { action: "calc_total", plan, ...data });
          save("lab_amount", data.total);
        } catch (e) {
          print(out, e);
        }
      });

      // Billing submit triggers:
      // 1) /api/checkout/create (checkout)
      // 2) /api/billing/update (billing)
      document.getElementById("billingForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const planId = planEl.value;
          const email = emailEl.value;

          const chk = await postFetch("./api/checkout/create", { planId, email }); // checkout
          const bill = await postFetch("./api/billing/update", {
            name: document.getElementById("name").value,
            country: document.getElementById("country").value,
            address: document.getElementById("address").value,
            city: document.getElementById("city").value
          }); // billing

          save("lab_checkout", { ...chk, billingId: bill.billingId });
          print(out, { created: chk, billing: bill });

          // navigate to payment
          location.href = "./payment.html";
        } catch (e2) {
          print(out, { error: e2 });
        }
      });
    </script>
  </div>
</body>
</html>
