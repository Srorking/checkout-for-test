<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pricing - Plan Select</title>
  <link rel="stylesheet" href="./styles.css" />

  <!-- ✅ ضع Snippet تبع SDK تبعك هنا -->
  <script async src="https://sdk-29qr.onrender.com/tag/019cad91-9884-7813-8b60-83105b9aa785.js?v=0.2.2"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 style="margin:0">Pricing</h1>
        <div class="hint">Choose a plan (plan_select)</div>
      </div>
      <div class="nav">
        <a class="btn" href="./">Home</a>
        <a class="btn" href="./checkout.html">Checkout</a>
      </div>
    </div>

    <div class="grid">
      <div class="plan">
        <h3>Basic <span class="badge">monthly</span></h3>
        <p>$19.99 / month</p>
        <div class="row">
          <a class="btn primary" href="./checkout.html?plan=basic_monthly" data-testid="choose_basic_plan">
            Choose Plan
          </a>
        </div>
      </div>

      <div class="plan">
        <h3>Pro <span class="badge">monthly</span></h3>
        <p>$49.99 / month</p>
        <div class="row">
          <a class="btn primary" href="./checkout.html?plan=pro_monthly" data-testid="choose_pro_plan">
            Select Plan
          </a>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Tip</h2>
      <p class="hint">Buttons include text like <b>Choose Plan</b>/<b>Select Plan</b> to trigger your click heuristics.</p>
    </div>
  </div>
</body>
</html>
